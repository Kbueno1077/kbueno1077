name: Update contribution chart

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: pipipi-dev/gcchart@v1
        with:
          outputs: |
            contributions-monthly.svg?period=365&granularity=month
